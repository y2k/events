name = "events"
main = "bin/src/main.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "cd .. && make build"
watch_dir = ["../src"]

# Uncomment and configure when you create a D1 database:
# [[d1_databases]]
# binding = "DB"
# database_name = "events-db"
# database_id = "<your-database-id>"

[observability]
enabled = true
head_sampling_rate = 1
